name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Vank
        uses: actions/checkout@v4

      - name: Check out Pulse dependency
        uses: actions/checkout@v4
        with:
          repository: Knitweb/pulse
          path: pulse

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -e pulse
          python -m pip install -e .

      - name: Compile
        run: PYTHONPATH=src:pulse/src python -m py_compile src/knitweb_vank/*.py src/vank/*.py

      - name: Tests
        run: PYTHONPATH=src:pulse/src python -m pytest -q
